services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: interactive-work
    ports:
      - "8000:8000"
    environment:
      - FCA_API_EMAIL
      - FCA_API_KEY
      - PYTHONUNBUFFERED=1
    command: pdm run python -m fca_mcp serve --reload

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite_data:/data

volumes:
  azurite_data: