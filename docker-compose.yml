services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: r5e-mcp-server
    ports:
      - "8000:8000"
    environment:
      - FCA_API_EMAIL=${FCA_API_EMAIL}
      - FCA_API_KEY=${FCA_API_KEY}
      - PYTHONUNBUFFERED=1
    command: pdm run python fca_mcp_server.py --http-mode --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"  # Blob
      - "10001:10001"  # Queue
      - "10002:10002"  # Table
    volumes:
      - azurite_data:/data

volumes:
  azurite_data: