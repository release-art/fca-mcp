<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCA MCP Interactive</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
    }

}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body class="bg-gray-50 text-gray-900 min-h-screen font-sans">

<!-- Header (authenticated) -->
<header id="app-header" class="hidden sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <svg class="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>

      </div>

<!-- Login Page -->
<div id="login-section" class="hidden">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8 text-center">

<!-- Tools Section (authenticated) -->
<div id="tools-section" class="hidden">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6">

    <!-- Search & Filter Bar -->
    <div class="mb-6">
      <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between mb-4">

          <h2 class="text-lg font-semibold text-gray-900">Available Tools</h2>

<script>
const AUTH0_DOMAIN = {{ domain | tojson }};
const AUTH0_AUDIENCE = {{ audience | tojson }};
const AUTH0_CLIENT_ID = {{ client_id | tojson }};
const MCP_URL = {{ mcp_url | tojson }};

let auth0Client = null;
let accessToken = null;
let toolsData = [];
let msgId = 0;
let resultTexts = {};
let activeCategories = new Set();
let searchQuery = '';

// ── Category Definitions ──
const CATEGORIES = {
  Search:      { color: 'blue',    icon: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>' },
  Firms:       { color: 'indigo',  icon: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"/></svg>' },
  Funds:       { color: 'emerald', icon: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"/></svg>' },
  Individuals: { color: 'amber',   icon: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>' },
  Markets:     { color: 'rose',    icon: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5a17.92 17.92 0 0 1-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418"/></svg>' },
  Other:       { color: 'gray',    icon: '<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>' },
};

const COLOR_MAP = {
  blue:    { bg: 'bg-blue-50',    text: 'text-blue-700',    border: 'border-blue-200',    ring: 'ring-blue-500/20',    badge: 'bg-blue-100 text-blue-700',    pillActive: 'bg-blue-100 text-blue-700 border-blue-300',    pillInactive: 'bg-white text-gray-600 border-gray-200 hover:border-gray-300' },
  indigo:  { bg: 'bg-indigo-50',  text: 'text-indigo-700',  border: 'border-indigo-200',  ring: 'ring-indigo-500/20',  badge: 'bg-indigo-100 text-indigo-700',  pillActive: 'bg-indigo-100 text-indigo-700 border-indigo-300',  pillInactive: 'bg-white text-gray-600 border-gray-200 hover:border-gray-300' },
  emerald: { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200', ring: 'ring-emerald-500/20', badge: 'bg-emerald-100 text-emerald-700', pillActive: 'bg-emerald-100 text-emerald-700 border-emerald-300', pillInactive: 'bg-white text-gray-600 border-gray-200 hover:border-gray-300' },
  amber:   { bg: 'bg-amber-50',   text: 'text-amber-700',   border: 'border-amber-200',   ring: 'ring-amber-500/20',   badge: 'bg-amber-100 text-amber-700',   pillActive: 'bg-amber-100 text-amber-700 border-amber-300',   pillInactive: 'bg-white text-gray-600 border-gray-200 hover:border-gray-300' },
  rose:    { bg: 'bg-rose-50',    text: 'text-rose-700',    border: 'border-rose-200',    ring: 'ring-rose-500/20',    badge: 'bg-rose-100 text-rose-700',    pillActive: 'bg-rose-100 text-rose-700 border-rose-300',    pillInactive: 'bg-white text-gray-600 border-gray-200 hover:border-gray-300' },
  gray:    { bg: 'bg-gray-50',    text: 'text-gray-700',    border: 'border-gray-200',    ring: 'ring-gray-500/20',    badge: 'bg-gray-100 text-gray-700',    pillActive: 'bg-gray-100 text-gray-700 border-gray-300',    pillInactive: 'bg-white text-gray-600 border-gray-200 hover:border-gray-300' },
};

function getCategory(name) {
  if (name.startsWith('search_')) return 'Search';
  if (name.startsWith('get_firm')) return 'Firms';
  if (name.startsWith('get_fund')) return 'Funds';
  if (name.startsWith('get_individual')) return 'Individuals';
  if (name.startsWith('get_regulated')) return 'Markets';
  return 'Other';
}

function formatToolName(name) {
  return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ── Auth0 ──
async function initAuth0() {
  auth0Client = await auth0.createAuth0Client({
    domain: AUTH0_DOMAIN,
    clientId: AUTH0_CLIENT_ID,
    authorizationParams: {
      audience: AUTH0_AUDIENCE,
      scope: 'openid profile email fca-api:read',
      redirect_uri: window.location.origin + '/interactive/',
    },
    cacheLocation: 'localstorage',
  });

  if (window.location.search.includes('code=')) {
    await auth0Client.handleRedirectCallback();
    window.history.replaceState({}, '', '/interactive/');
  }

  const isAuthenticated = await auth0Client.isAuthenticated();
  if (isAuthenticated) {
    await showAuthenticated();
  } else {
    document.getElementById('login-section').classList.remove('hidden');
  }
}

async function login() {
  await auth0Client.loginWithRedirect();
}

async function logout() {
  await auth0Client.logout({ logoutParams: { returnTo: window.location.origin + '/interactive/' } });
}

async function showAuthenticated() {
  const user = await auth0Client.getUser();
  const email = user.email || user.name || 'User';
  document.getElementById('user-email').textContent = email;
  document.getElementById('user-avatar').textContent = email.charAt(0).toUpperCase();
  document.getElementById('app-header').classList.remove('hidden');
  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('tools-section').classList.remove('hidden');
  accessToken = await auth0Client.getTokenSilently();
  await loadTools();
}

// ── MCP JSON-RPC ──
async function mcpRequest(method, params) {
  const id = ++msgId;
  const message = { jsonrpc: '2.0', id, method, params: params || {} };

  const resp = await fetch(MCP_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json, text/event-stream',
      'Authorization': 'Bearer ' + accessToken,
    },
    body: JSON.stringify(message),
  });

  if (!resp.ok) {
    const text = await resp.text();
    throw new Error('HTTP ' + resp.status + ': ' + text.substring(0, 200));
  }

  const contentType = resp.headers.get('content-type') || '';
  const text = await resp.text();

  if (contentType.includes('text/event-stream')) {
    for (const line of text.split('\n')) {
      if (line.startsWith('data:')) {
        try {
          const msg = JSON.parse(line.slice(5).trim());
          if (msg.id === id) return msg;
        } catch (e) { /* skip malformed SSE data */ }
      }
    }
    throw new Error('No matching response in SSE stream');
  }

  return JSON.parse(text);
}

// ── Load & Render Tools ──
async function loadTools() {
  try {
    const resp = await mcpRequest('tools/list', {});
    if (resp.error) throw new Error(resp.error.message || JSON.stringify(resp.error));
    toolsData = resp.result.tools || [];
    // Initialize all categories as active
    const cats = new Set(toolsData.map(t => getCategory(t.name)));
    activeCategories = cats;
    renderCategoryPills();
    renderTools();
  } catch (e) {
    document.getElementById('tools-grid').innerHTML =
      '<div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">'
      + '<p class="font-medium">Failed to load tools</p>'
      + '<p class="mt-1 text-red-600">' + escapeHtml(e.message) + '</p></div>';
  }
}

function renderCategoryPills() {
  const cats = {};
  toolsData.forEach(t => {
    const cat = getCategory(t.name);
    cats[cat] = (cats[cat] || 0) + 1;
  });

  const container = document.getElementById('category-pills');
  let html = '';
  for (const [cat, count] of Object.entries(cats)) {
    const catDef = CATEGORIES[cat] || CATEGORIES.Other;
    const colors = COLOR_MAP[catDef.color];
    const isActive = activeCategories.has(cat);
    const cls = isActive ? colors.pillActive : colors.pillInactive;
    html += '<button onclick="toggleCategory(\'' + cat + '\')" '
      + 'class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border transition-all ' + cls + '" '
      + 'data-category="' + cat + '">'
      + cat + ' <span class="opacity-60">' + count + '</span></button>';
  }
  container.innerHTML = html;
}

function toggleCategory(cat) {
  if (activeCategories.has(cat)) {
    // Don't allow deactivating all
    if (activeCategories.size <= 1) return;
    activeCategories.delete(cat);
  } else {
    activeCategories.add(cat);
  }
  renderCategoryPills();
  renderTools();
}

function getVisibleTools() {
  const q = searchQuery.toLowerCase();
  return toolsData.filter(t => {
    const cat = getCategory(t.name);
    if (!activeCategories.has(cat)) return false;
    if (q && !t.name.toLowerCase().includes(q) && !(t.description || '').toLowerCase().includes(q)) return false;
    return true;
  });
}

function filterTools() {
  searchQuery = document.getElementById('search-input').value.trim();
  renderTools();
}

function renderTools() {
  const grid = document.getElementById('tools-grid');
  const visible = getVisibleTools();

  // Count text
  const countText = document.getElementById('tool-count-text');
  if (searchQuery || activeCategories.size < Object.keys(CATEGORIES).length) {
    countText.textContent = visible.length + ' of ' + toolsData.length + ' tools';
  } else {
    countText.textContent = toolsData.length + ' tools available';
  }

  if (visible.length === 0) {
    grid.innerHTML = '<div class="text-center py-16"><p class="text-sm text-gray-500">No tools match your filter.</p></div>';
    return;
  }

  // Group by category
  const groups = {};
  visible.forEach((t, origIdx) => {
    const cat = getCategory(t.name);
    if (!groups[cat]) groups[cat] = [];
    const globalIdx = toolsData.indexOf(t);
    groups[cat].push({ tool: t, idx: globalIdx });
  });

  // Render in category order
  const order = ['Search', 'Firms', 'Funds', 'Individuals', 'Markets', 'Other'];
  let html = '';
  for (const cat of order) {
    if (!groups[cat]) continue;
    const catDef = CATEGORIES[cat] || CATEGORIES.Other;
    const colors = COLOR_MAP[catDef.color];

    html += '<div class="space-y-3">';
    // Section header
    html += '<div class="flex items-center gap-2.5 mb-1">'
      + '<div class="' + colors.bg + ' ' + colors.text + ' p-1.5 rounded-lg">' + catDef.icon + '</div>'
      + '<h3 class="text-sm font-semibold text-gray-700">' + cat + '</h3>'
      + '<span class="text-xs ' + colors.badge + ' px-2 py-0.5 rounded-full font-medium">' + groups[cat].length + '</span>'
      + '</div>';

    // Tool cards
    for (const { tool, idx } of groups[cat]) {
      html += renderToolCard(tool, idx, catDef.color);
    }
    html += '</div>';
  }
  grid.innerHTML = html;
}

function renderToolCard(tool, idx, colorName) {
  const props = tool.inputSchema?.properties || {};
  const required = tool.inputSchema?.required || [];
  const annotations = tool.annotations || {};
  const colors = COLOR_MAP[colorName];

  let badges = '';
  if (annotations.readOnlyHint) {
    badges += '<span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200">'
      + '<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>'
      + 'read-only</span>';
  }

  let fields = '';
  for (const [name, schema] of Object.entries(props)) {
    const isReq = required.includes(name);
    const desc = schema.description || '';
    const type = schema.type || 'string';
    let input;
    const baseInputCls = 'w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all';
    if (type === 'integer' || type === 'number') {
      input = '<input type="number" id="field-' + idx + '-' + name + '" class="' + baseInputCls + '" ' + (isReq ? 'required' : '') + '>';
    } else if (type === 'boolean') {
      input = '<select id="field-' + idx + '-' + name + '" class="' + baseInputCls + '">'
        + '<option value="">-- select --</option>'
        + '<option value="true">true</option>'
        + '<option value="false">false</option></select>';
    } else {
      input = '<input type="text" id="field-' + idx + '-' + name + '" class="' + baseInputCls + '" placeholder="' + escapeHtml(type) + '" ' + (isReq ? 'required' : '') + '>';
    }
    fields += '<div class="space-y-1">'
      + '<label class="block text-xs font-semibold text-gray-700">'
      + escapeHtml(name) + (isReq ? ' <span class="text-red-400">*</span>' : '')
      + '</label>'
      + (desc ? '<p class="text-xs text-gray-400 leading-relaxed">' + escapeHtml(desc) + '</p>' : '')
      + input + '</div>';
  }

  return '<div class="bg-white border border-gray-200 rounded-xl overflow-hidden hover:shadow-md hover:shadow-gray-100 transition-all">'
    // Header
    + '<div class="px-4 py-3 cursor-pointer flex items-center justify-between gap-3 hover:bg-gray-50/50 transition-colors" onclick="toggleTool(' + idx + ')">'
    + '<div class="min-w-0">'
    + '<div class="flex items-center gap-2 flex-wrap">'
    + '<code class="text-sm font-semibold text-gray-900">' + escapeHtml(tool.name) + '</code>'
    + badges
    + '</div>'
    + (tool.description ? '<p class="text-xs text-gray-500 mt-0.5 line-clamp-1">' + escapeHtml(tool.description) + '</p>' : '')
    + '</div>'
    + '<svg id="expand-' + idx + '" class="w-4 h-4 text-gray-400 shrink-0 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>'
    + '</div>'
    // Body
    + '<div class="tool-body px-4 border-t border-gray-100" id="body-' + idx + '">'
    + (fields
      ? '<div class="space-y-3">' + fields + '</div>'
      : '<p class="text-xs text-gray-400 italic">No parameters required.</p>')
    + '<div class="mt-4 flex items-center gap-2">'
    + '<button class="inline-flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-medium px-4 py-2 rounded-lg transition-all hover:shadow-md hover:shadow-indigo-200 active:scale-[0.98]" onclick="callTool(' + idx + ')">'
    + '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg>'
    + 'Run</button>'
    + '</div>'
    + '<div id="result-' + idx + '"></div>'
    + '</div></div>';
}

function toggleTool(idx) {
  const body = document.getElementById('body-' + idx);
  const expand = document.getElementById('expand-' + idx);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  if (isOpen) {
    expand.style.transform = '';
  } else {
    expand.style.transform = 'rotate(180deg)';
  }
}

// ── Call Tool ──
async function callTool(idx) {
  const tool = toolsData[idx];
  const props = tool.inputSchema?.properties || {};
  const args = {};

  for (const [name, schema] of Object.entries(props)) {
    const el = document.getElementById('field-' + idx + '-' + name);
    if (!el) continue;
    let val = el.value.trim();
    if (!val) continue;
    const type = schema.type || 'string';
    if (type === 'integer') val = parseInt(val, 10);
    else if (type === 'number') val = parseFloat(val);
    else if (type === 'boolean') val = val === 'true';
    args[name] = val;
  }

  const resultDiv = document.getElementById('result-' + idx);
  resultDiv.innerHTML = '<div class="mt-4 flex items-center gap-2 text-sm text-gray-500">'
    + '<svg class="w-4 h-4 spinner" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>'
    + 'Calling <code class="font-medium">' + escapeHtml(tool.name) + '</code>...</div>';

  try {
    accessToken = await auth0Client.getTokenSilently();
    const resp = await mcpRequest('tools/call', { name: tool.name, arguments: args });
    if (resp.error) throw new Error(resp.error.message || JSON.stringify(resp.error));
    const result = resp.result;
    if (result.isError) {
      const errText = (result.content || []).map(c => c.text || '').join('\n');
      resultDiv.innerHTML = renderResultBox(idx, errText || 'Tool returned an error', true);
    } else {
      const rawText = (result.content || []).map(c => c.text || JSON.stringify(c, null, 2)).join('\n');
      resultTexts[idx] = rawText;
      resultDiv.innerHTML = renderResultBox(idx, rawText, false);
    }
  } catch (e) {
    resultDiv.innerHTML = renderResultBox(idx, 'Error: ' + e.message, true);
  }
}

function renderResultBox(idx, text, isError) {
  const lines = text.split('\n');
  const isLong = lines.length > 25;
  const previewText = isLong ? lines.slice(0, 25).join('\n') : text;

  let highlighted;
  try {
    // Try to parse as JSON for syntax highlighting
    JSON.parse(text);
    highlighted = syntaxHighlight(text);
  } catch {
    highlighted = escapeHtml(text);
  }

  let previewHighlighted;
  if (isLong) {
    try {
      JSON.parse(previewText + '\n...');
      previewHighlighted = syntaxHighlight(previewText) + '\n<span class="text-gray-400">...</span>';
    } catch {
      previewHighlighted = escapeHtml(previewText) + '\n<span class="text-gray-400">...</span>';
    }
  }

  const bgCls = isError ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-200';
  const textCls = isError ? 'text-red-800' : '';

  let html = '<div class="mt-4 relative group">';

  // Copy button (only for non-error)
  if (!isError) {
    html += '<button onclick="copyResult(' + idx + ', this)" class="absolute top-2 right-2 z-10 opacity-0 group-hover:opacity-100 transition-opacity bg-white border border-gray-200 text-gray-500 hover:text-gray-700 hover:border-gray-300 rounded-lg p-1.5 shadow-sm" title="Copy to clipboard">'
      + '<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9.75a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184"/></svg>'
      + '</button>';
  }

  html += '<pre class="' + bgCls + ' border rounded-xl p-4 text-xs font-mono leading-relaxed overflow-x-auto max-h-96 overflow-y-auto ' + textCls + '" id="result-pre-' + idx + '">'
    + (isLong ? previewHighlighted : highlighted)
    + '</pre>';

  if (isLong) {
    html += '<button onclick="expandResult(' + idx + ')" id="expand-result-' + idx + '" '
      + 'class="mt-2 text-xs text-indigo-600 hover:text-indigo-700 font-medium transition-colors">'
      + 'Show all ' + lines.length + ' lines</button>';
  }

  html += '</div>';
  return html;
}

function expandResult(idx) {
  const text = resultTexts[idx];
  if (!text) return;
  const pre = document.getElementById('result-pre-' + idx);
  const btn = document.getElementById('expand-result-' + idx);
  let highlighted;
  try {
    JSON.parse(text);
    highlighted = syntaxHighlight(text);
  } catch {
    highlighted = escapeHtml(text);
  }
  pre.innerHTML = highlighted;
  btn.remove();
}

async function copyResult(idx, btn) {
  const text = resultTexts[idx];
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const origHTML = btn.innerHTML;
    btn.innerHTML = '<svg class="w-3.5 h-3.5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>';
    btn.classList.add('opacity-100');
    setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove('opacity-100'); }, 1500);
  } catch (e) { /* clipboard API may fail in some contexts */ }
}

// ── JSON Syntax Highlighting ──
function syntaxHighlight(json) {
  try {
    const obj = JSON.parse(json);
    json = JSON.stringify(obj, null, 2);
  } catch { /* use as-is */ }

  return escapeHtml(json).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    function (match) {
      let cls = 'text-blue-600'; // number
      if (/^"/.test(match)) {
        if (/:$/.test(match)) {
          cls = 'text-gray-800 font-medium'; // key
          match = match.replace(/:$/, '') + ':';
        } else {
          cls = 'text-emerald-600'; // string
        }
      } else if (/true|false/.test(match)) {
        cls = 'text-purple-600'; // boolean
      } else if (/null/.test(match)) {
        cls = 'text-gray-400'; // null
      }
      return '<span class="' + cls + '">' + match + '</span>';
    }
  );
}

// ── Utilities ──
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Init ──
initAuth0().catch(e => {
  console.error('Auth0 init error:', e);
  document.getElementById('login-section').classList.remove('hidden');
});
</script>
