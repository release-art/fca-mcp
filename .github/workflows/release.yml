name: Release
on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["CI"]
    branches: [main, ci-2]
    types:
      - completed

env:
  IMAGE_NAME: "fca-mcp"

jobs:
  start:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Start release
        run: echo "Starting release process"

  publish:
    needs: start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build the test image
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          tags: tmp-test-image
          target: test

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}
          username: ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_USER }}
          password: ${{ secrets.RELEASE_ART_CONTAINER_REGISTRY_TOKEN }}
      - name: Build & push the image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest
            ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          target: release