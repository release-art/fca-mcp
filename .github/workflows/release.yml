name: Release
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed


jobs:
  start:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Start release
        run: echo "Starting release process"

  publish:
    needs: start
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}
          username: ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_USER }}
          password: ${{ secrets.RELEASE_ART_CONTAINER_REGISTRY_TOKEN }}
      - name: Build the image
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          tags: "${{ env.LATEST_TAG }}"
          target: release
      - name: Test
        run: |
          docker run --rm "${{ env.LATEST_TAG }}" -- pytest
      - name: Push
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}/${{ env.LATEST_TAG }}