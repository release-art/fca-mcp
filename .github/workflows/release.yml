name: Release
on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

env:
  IMAGE_NAME: "fca-mcp"

jobs:
  start:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Start release
        run: echo "Starting release process"

  publish-package:
    needs: start
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
      - name: Install dependencies
        run: |
          python -m pip install pdm
      - name: Build packages
        run: pdm build
      - name: Publish distribution to Test PyPI
        run: |
          pdm publish --no-build
        env:
          PDM_PUBLISH_REPO: 'https://test.pypi.org/legacy/'
      - name: Publish distribution to PRODUCTION PyPI
        # if: false
        run: |
          pdm publish --no-build

  publish-image:
    needs: start
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build the test image
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          tags: tmp-test-image
          target: test

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}
          username: ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_USER }}
          password: ${{ secrets.RELEASE_ART_CONTAINER_REGISTRY_TOKEN }}
      - name: Build & push the image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:latest
            ${{ vars.RELEASE_ART_CONTAINER_REGISTRY_HOST }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          target: release

  bump-version: # Bump version for the next release
    needs: 
      - publish-package
      - publish-image
    runs-on: ubuntu-latest
    # Bump version in the PR that targets the "main" branch
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_ART_WORKFLOW_APP_ID }}
          private-key: ${{ secrets.RELEASE_ART_WORKFLOW_APP_PK }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v6
      - name: Install dependencies
        run: |
          python -m pip install pdm
          pdm self add pdm-bump
      - name: Bump version
        run: |
          pdm bump patch
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: ${{ steps.app-token.outputs.app-slug }}[bot]
          commit_user_email: ${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          commit_message: |-
            [ci skip] Bump version for next release


            skip-checks: true
          create_branch: false